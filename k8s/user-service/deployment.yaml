apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: otss
  labels:
    app: user-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: user-service
  template:
    metadata:
      labels:
        app: user-service
    spec:
      nodeSelector:
        nodegroup: services
      containers:
        - name: user-service
          image: ghcr.io/ravindu-ishan/user-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3010
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3010"
            - name: LOG_LEVEL
              value: "info"
            - name: LOG_TO_FILE
              value: "false"
            - name: WSO2_END_USER_GROUP
              value: "OTS_END_USER"
            - name: WSO2_SCIM_BASE_URL
              value: "https://wso2-is-identity-server.otss.svc.cluster.local:9443"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: DATABASE_URL
            - name: WSO2_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: WSO2_CLIENT_ID
            - name: WSO2_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: WSO2_CLIENT_SECRET
            - name: WSO2_WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: user-service-secrets
                  key: WSO2_WEBHOOK_SECRET
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 20
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /health
              port: 3010
            initialDelaySeconds: 30
            periodSeconds: 15
            failureThreshold: 3
---
apiVersion: v1
kind: Service
metadata:
  name: user-service
  namespace: otss
  labels:
    app: user-service
spec:
  selector:
    app: user-service
  ports:
    - port: 3010
      targetPort: 3010
  type: ClusterIP
