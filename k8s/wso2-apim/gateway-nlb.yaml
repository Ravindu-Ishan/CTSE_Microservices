apiVersion: v1
kind: Service
metadata:
  name: wso2-apim-gateway-nlb
  namespace: otss
  annotations:
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-scheme: "internet-facing"
spec:
  type: LoadBalancer
  selector:
    deployment: wso2-apim-wso2am-all-in-one-am
    node: wso2-apim-wso2am-all-in-one-am-1
  ports:
    - name: pass-through-http
      port: 8280
      targetPort: 8280
      protocol: TCP
    - name: pass-through-https
      port: 8243
      targetPort: 8243
      protocol: TCP
