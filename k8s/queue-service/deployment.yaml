apiVersion: apps/v1
kind: Deployment
metadata:
  name: queue-service
  namespace: otss
  labels:
    app: queue-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: queue-service
  template:
    metadata:
      labels:
        app: queue-service
    spec:
      nodeSelector:
        nodegroup: services
      containers:
        - name: queue-service
          image: ghcr.io/ravindu-ishan/queue-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3040
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3040"
            - name: LOG_LEVEL
              value: "info"
            - name: KAFKA_BROKERS
              value: "kafka.otss.svc.cluster.local:9092"
            - name: KAFKA_CLIENT_ID
              value: "queue-service"
            - name: USER_SERVICE_URL
              value: "http://user-service.otss.svc.cluster.local:3010"
            - name: TICKET_SERVICE_URL
              value: "http://ticket-service.otss.svc.cluster.local:3030"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: queue-service-secrets
                  key: DATABASE_URL
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3040
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3040
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: queue-service
  namespace: otss
spec:
  selector:
    app: queue-service
  ports:
    - port: 3040
      targetPort: 3040
  type: ClusterIP
