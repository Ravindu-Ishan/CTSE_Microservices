apiVersion: apps/v1
kind: Deployment
metadata:
  name: notification-service
  namespace: otss
  labels:
    app: notification-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: notification-service
  template:
    metadata:
      labels:
        app: notification-service
    spec:
      nodeSelector:
        nodegroup: services
      containers:
        - name: notification-service
          image: ghcr.io/ravindu-ishan/notification-service:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 3050
          env:
            - name: NODE_ENV
              value: "production"
            - name: PORT
              value: "3050"
            - name: LOG_LEVEL
              value: "info"
            - name: KAFKA_BROKERS
              value: "kafka.otss.svc.cluster.local:9092"
            - name: KAFKA_CLIENT_ID
              value: "notification-service"
            - name: USER_SERVICE_URL
              value: "http://user-service.otss.svc.cluster.local:3010"
            - name: APP_BASE_URL
              value: "http://localhost:3000"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: DATABASE_URL
            - name: GMAIL_USER
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: GMAIL_USER
            - name: GMAIL_APP_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: notification-service-secrets
                  key: GMAIL_APP_PASSWORD
          resources:
            requests:
              memory: "256Mi"
              cpu: "100m"
            limits:
              memory: "512Mi"
              cpu: "500m"
          readinessProbe:
            httpGet:
              path: /health
              port: 3050
            initialDelaySeconds: 20
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 3050
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: notification-service
  namespace: otss
spec:
  selector:
    app: notification-service
  ports:
    - port: 3050
      targetPort: 3050
  type: ClusterIP
