# ============================================================
# OTSS Kafka — Local Development Stack
#
# Kafka in KRaft mode (no ZooKeeper) + Kafka UI
#
# Usage:
#   docker compose up -d          # start
#   docker compose down           # stop (keeps volumes)
#   docker compose down -v        # full teardown incl. volumes
#
# Kafka broker:  localhost:9092   (from your host machine)
#                kafka:29092      (from within Docker network)
# Kafka UI:      http://localhost:8080
#
# Topics are auto-created on first publish/subscribe.
# ============================================================

services:

  # ----------------------------------------------------------
  # Kafka — KRaft mode (no ZooKeeper required)
  # Combined mode: acts as both broker and controller
  # ----------------------------------------------------------
  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: otss_kafka
    restart: unless-stopped
    ports:
      - "9092:9092"     # external — your local services connect here
    environment:
      # KRaft — combined broker + controller mode
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:29093

      # Listeners
      # PLAINTEXT     — internal Docker network (service-to-service)
      # PLAINTEXT_HOST — external (your local machine / host)
      # CONTROLLER    — KRaft internal controller communication
      KAFKA_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://0.0.0.0:9092,CONTROLLER://kafka:29093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT,CONTROLLER:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      # Single broker settings
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_DEFAULT_REPLICATION_FACTOR: 1
      KAFKA_NUM_PARTITIONS: 1

      # Auto-create topics — convenient for local dev
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

      # Unique cluster ID — required for KRaft
      # Generate your own with: kafka-storage random-uuid
      CLUSTER_ID: "MkU3OEVBNTcwNTJENDM2Qk"

      # Reduce log noise in local dev
      KAFKA_LOG4J_ROOT_LOGLEVEL: WARN
      KAFKA_TOOLS_LOG4J_LOGLEVEL: ERROR

    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - otss_kafka_net

  # ----------------------------------------------------------
  # Kafka UI — web interface for browsing topics,
  # consumer groups, messages, and broker health
  # Access at: http://localhost:8080
  # ----------------------------------------------------------
  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: otss_kafka_ui
    restart: unless-stopped
    depends_on:
      kafka:
        condition: service_healthy
    ports:
      - "8080:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: otss-local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092
      # Enable dynamic config — lets you add clusters from the UI
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - otss_kafka_net

volumes:
  kafka_data:
    driver: local

networks:
  otss_kafka_net:
    driver: bridge
    # External so other compose stacks (user-service, ticket-service etc.)
    # can connect to Kafka by joining this network
    name: otss_kafka_net
