sonar.organization=ravindu-ishan
sonar.projectKey=Ravindu-Ishan_CTSE_Microservices
sonar.projectName=CTSE Microservices

# Analyse all four NestJS services
sonar.sources=OTSS_User_Service/src,OTSS_Ticket_Service/src,OTSS_Queue_Service/src,OTSS_Notification_Service/src

# Exclude test files, dist, and node_modules from analysis
sonar.exclusions=**/node_modules/**,**/dist/**,**/test/**,**/*.spec.ts,**/generated/**

# TypeScript specific
sonar.typescript.tsconfigPath=OTSS_User_Service/tsconfig.json

# Encoding
sonar.sourceEncoding=UTF-8
