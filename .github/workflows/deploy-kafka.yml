name: Deploy Kafka

on:
  push:
    branches:
      - master
    paths:
      - 'k8s/kafka/**'
      - '.github/workflows/deploy-kafka.yml'
  workflow_dispatch:

env:
  HELM_NAMESPACE: otss

jobs:
  deploy:
    name: Deploy Kafka to EKS
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-Kafka-Deploy

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Deploy Kafka
        run: kubectl apply -f k8s/kafka/kafka.yaml

      - name: Verify Kafka
        run: |
          kubectl rollout status deployment/kafka \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=120s
