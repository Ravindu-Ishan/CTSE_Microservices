# ============================================================
# WSO2 IS 7.2.0 — Build, Push, Deploy
#
# Triggers:
#   - Push to main that touches WSO2 IS source files
#   - Manual dispatch
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN        — ARN of the GitHub Actions IAM role from Terraform
#   RDS_ENDPOINT        — from: terraform output rds_endpoint
#   DB_PASSWORD         — RDS master password
#   WSO2_ADMIN_PASSWORD — WSO2 IS admin password
#
# Required GitHub Variables:
#   AWS_REGION          — ap-southeast-1
#   EKS_CLUSTER_NAME    — otss-staging-cluster
# ============================================================

name: Deploy WSO2 IS

on:
  push:
    branches:
      - main
    paths:
      - 'WSO2_IAM_Docker_7.2/**'
      - 'kubernetes-is-7.2.0.1/values-staging.yaml'
      - '.github/workflows/deploy-wso2-is.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ravindu-ishan/wso2-is
  IMAGE_TAG: "7.2.0"
  HELM_RELEASE_NAME: wso2-is
  HELM_NAMESPACE: otss
  HELM_CHART_VERSION: "7.2.0-1"
  VALUES_FILE: ./kubernetes-is-7.2.0.1/values-staging.yaml

jobs:

  build-and-push:
    name: Build & Push WSO2 IS Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WSO2 IS image
        uses: docker/build-push-action@v5
        with:
          context: ./WSO2_IAM_Docker_7.2/docker-compose/is
          file: ./WSO2_IAM_Docker_7.2/docker-compose/is/dockerfiles/is/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

  deploy:
    name: Helm Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-WSO2IS-Deploy

      - name: Update kubeconfig for EKS cluster
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Add WSO2 Helm repository
        run: |
          helm repo add wso2 https://helm.wso2.com
          helm repo update

      - name: Create namespace if not exists
        run: kubectl apply -f k8s/namespace.yaml

      - name: Inject secrets into values file
        # Replaces placeholders with real values from GitHub Secrets.
        # Values are never stored in the repo.
        run: |
          sed -i "s|<RDS_ENDPOINT>|${{ secrets.RDS_ENDPOINT }}|g" ${{ env.VALUES_FILE }}
          sed -i "s|<DB_PASSWORD>|${{ secrets.DB_PASSWORD }}|g" ${{ env.VALUES_FILE }}
          sed -i "s|<WSO2_ADMIN_PASSWORD>|${{ secrets.WSO2_ADMIN_PASSWORD }}|g" ${{ env.VALUES_FILE }}

      - name: Helm upgrade --install WSO2 IS
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} \
            wso2/identity-server \
            --version ${{ env.HELM_CHART_VERSION }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --values ${{ env.VALUES_FILE }} \
            --timeout 10m \
            --wait \
            --atomic

      - name: Verify deployment
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }} \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=600s
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} \
            -l app.kubernetes.io/name=identity-server
