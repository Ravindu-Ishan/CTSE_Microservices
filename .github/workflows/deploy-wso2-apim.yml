# ============================================================
# WSO2 APIM 4.6.0 — Build, Push, Deploy
#
# Triggers on push to master when any of these change:
#   - WSO2 APIM Docker source   → rebuilds and pushes image
#   - k8s/wso2-apim/**          → values changed
#
# Flow:
#   1. Build custom WSO2 APIM image (Alpine + JDK21 + WSO2 APIM + PostgreSQL JDBC)
#   2. Push to ghcr.io/ravindu-ishan/wso2-apim:4.6.0
#   3. Inject secrets into k8s/wso2-apim/values.yaml
#   4. helm upgrade using remote wso2/wso2am-all-in-one chart from helm.wso2.com
#
# Required GitHub Secrets:
#   AWS_ROLE_ARN        — IAM role ARN for OIDC auth
#   RDS_ENDPOINT        — from: terraform output rds_endpoint
#   DB_PASSWORD         — RDS master password
#   APIM_ADMIN_PASSWORD — WSO2 APIM admin password
#
# Required GitHub Variables:
#   AWS_REGION       — ap-southeast-1
#   EKS_CLUSTER_NAME — otss-staging-cluster
# ============================================================

name: Deploy WSO2 APIM

on:
  push:
    branches:
      - master
    paths:
      - 'WSO2_APIM_Docker_4.6.0.2/**'
      - 'k8s/wso2-apim/**'
      - '.github/workflows/deploy-wso2-apim.yml'
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ghcr.io/ravindu-ishan/wso2-apim
  IMAGE_TAG: "4.6.0"
  HELM_RELEASE_NAME: wso2-apim
  HELM_NAMESPACE: otss
  HELM_CHART_VERSION: "4.6.0-2"
  VALUES_FILE: ./k8s/wso2-apim/values.yaml

jobs:

  build-and-push:
    name: Build & Push WSO2 APIM Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image-digest: ${{ steps.build.outputs.digest }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push WSO2 APIM image
        id: build
        uses: docker/build-push-action@v5
        with:
          context: ./WSO2_APIM_Docker_4.6.0.2/dockerfiles/alpine/apim
          file: ./WSO2_APIM_Docker_4.6.0.2/dockerfiles/alpine/apim/Dockerfile
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=${{ env.IMAGE_NAME }}:buildcache,mode=max
          platforms: linux/amd64

      - name: Export image digest
        run: echo "APIM_IMAGE_DIGEST=${{ steps.build.outputs.digest }}" >> $GITHUB_ENV

  deploy:
    name: Helm Deploy to EKS
    runs-on: ubuntu-latest
    needs: build-and-push
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Configure AWS credentials via OIDC
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_ROLE_ARN }}
          aws-region: ${{ vars.AWS_REGION }}
          role-session-name: GitHubActions-WSOAPIS-Deploy

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --region ${{ vars.AWS_REGION }} \
            --name ${{ vars.EKS_CLUSTER_NAME }}

      - name: Install Helm
        uses: azure/setup-helm@v3
        with:
          version: 'v3.14.0'

      - name: Inject secrets and image digest into values file
        run: |
          sed -i "s|<RDS_ENDPOINT>|${{ secrets.RDS_ENDPOINT }}|g" ${{ env.VALUES_FILE }}
          sed -i "s|<DB_PASSWORD>|${{ secrets.DB_PASSWORD }}|g" ${{ env.VALUES_FILE }}
          sed -i "s|<APIM_ADMIN_PASSWORD>|${{ secrets.APIM_ADMIN_PASSWORD }}|g" ${{ env.VALUES_FILE }}
          sed -i "s|<IMAGE_DIGEST>|${{ needs.build-and-push.outputs.image-digest }}|g" ${{ env.VALUES_FILE }}

      - name: Extract default keystores from APIM image and create K8s secret
        run: |
          docker pull ghcr.io/ravindu-ishan/wso2-apim@${{ needs.build-and-push.outputs.image-digest }}
          docker create --name apim-tmp ghcr.io/ravindu-ishan/wso2-apim@${{ needs.build-and-push.outputs.image-digest }}
          docker cp apim-tmp:/home/wso2carbon/wso2am-4.6.0/repository/resources/security/wso2carbon.jks ./wso2carbon.jks
          docker cp apim-tmp:/home/wso2carbon/wso2am-4.6.0/repository/resources/security/client-truststore.jks ./client-truststore.jks
          docker rm apim-tmp
          # Delete existing secret if present then recreate
          # Cannot use apply on binary secrets due to annotation size limit
          kubectl delete secret wso2-apim-keystore-secret \
            -n ${{ env.HELM_NAMESPACE }} --ignore-not-found
          kubectl create secret generic wso2-apim-keystore-secret \
            --from-file=wso2carbon.jks=./wso2carbon.jks \
            --from-file=client-truststore.jks=./client-truststore.jks \
            -n ${{ env.HELM_NAMESPACE }}

      - name: Add WSO2 Helm repository
        run: |
          helm repo add wso2 https://helm.wso2.com
          helm repo update

      - name: Helm upgrade --install
        run: |
          helm upgrade --install ${{ env.HELM_RELEASE_NAME }} \
            wso2/wso2am-all-in-one \
            --version ${{ env.HELM_CHART_VERSION }} \
            --namespace ${{ env.HELM_NAMESPACE }} \
            --values ${{ env.VALUES_FILE }}

      - name: Patch tolerations onto APIM deployment
        # The APIM Helm chart has no tolerations support in its template.
        # We must patch it directly after every helm upgrade.
        # Uses a retry loop to handle timing between helm deploy and patch.
        run: |
          for i in 1 2 3; do
            kubectl patch deployment ${{ env.HELM_RELEASE_NAME }}-wso2am-all-in-one-am-deployment-1 \
              -n ${{ env.HELM_NAMESPACE }} \
              --type=merge \
              -p '{"spec":{"template":{"spec":{"tolerations":[{"key":"workload","operator":"Equal","value":"wso2","effect":"NoSchedule"}]}}}}' \
            && echo "Patch applied successfully" && break \
            || echo "Patch attempt $i failed, retrying in 5s..." && sleep 5
          done

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/${{ env.HELM_RELEASE_NAME }}-wso2am-all-in-one-am-deployment-1 \
            -n ${{ env.HELM_NAMESPACE }} \
            --timeout=900s

      - name: Verify deployment
        run: |
          kubectl get pods -n ${{ env.HELM_NAMESPACE }} \
            -l app.kubernetes.io/name=wso2am-all-in-one
