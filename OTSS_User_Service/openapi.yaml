openapi: 3.1.0
info:
  title: OTSS User Service
  version: 0.2.0
  description: >
    Manages user registration via WSO2 SCIM2, IAM-synced user profiles,
    and support-staff availability data used by Queue/Ticket services.
servers:
  - url: http://localhost:3010
    description: Local development server
paths:
  /health:
    get:
      summary: Health check
      tags: [Health]
      responses:
        '200':
          description: Service is healthy
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
              example:
                status: ok

  /users/register:
    post:
      summary: Register a new end user
      description: Provisions the user in WSO2 IS via SCIM2, then creates a local profile. Role is always END_USER.
      tags: [Users]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterUserDto'
            example:
              username: john_doe
              email: john@example.com
              password: Secret123!
              firstName: John
              lastName: Doe
              phoneNumber: '+1234567890'
              timezone: Asia/Colombo
              language: en
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
              example:
                id: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
                username: john_doe
                email: john@example.com
                firstName: John
                lastName: Doe
                phoneNumber: '+1234567890'
                timezone: Asia/Colombo
                language: en
                role: END_USER
                lastLoginAt: null
                lastRegistrationAt: '2024-01-15T10:30:00Z'
                lastTokenIssuedAt: null
                lastTokenRevokedAt: null
                lastSessionActivityAt: null
                lastCredentialUpdateAt: null
                createdAt: '2024-01-15T10:30:00Z'
                updatedAt: '2024-01-15T10:30:00Z'
                staffStatus: null
        '400':
          description: Validation failed
        '500':
          description: WSO2 provisioning failed

  /profiles:
    get:
      summary: List profiles
      tags: [Profiles]
      parameters:
        - in: query
          name: email
          schema: { type: string, format: email }
          example: john@example.com
        - in: query
          name: role
          schema:
            $ref: '#/components/schemas/UserRole'
      responses:
        '200':
          description: Matching profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/Profile'

  /profiles/{id}:
    get:
      summary: Fetch a profile by ID
      tags: [Profiles]
      parameters:
        - $ref: '#/components/parameters/ProfileId'
      responses:
        '200':
          description: Profile found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Profile'
        '404':
          description: Profile not found

  /staff:
    get:
      summary: Discover staff for assignment
      tags: [Staff]
      parameters:
        - in: query
          name: category
          schema: { $ref: '#/components/schemas/TicketCategory' }
        - in: query
          name: isOnline
          schema: { type: boolean }
        - in: query
          name: hasCapacity
          description: Return only staff with currentLoad < maxLoad
          schema: { type: boolean }
        - in: query
          name: limit
          schema:
            type: integer
            minimum: 1
            maximum: 50
            default: 20
      responses:
        '200':
          description: Matching staff status rows with linked profiles
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/StaffStatusWithProfile'

  /staff/isonline/{profileId}:
    patch:
      summary: Update staff availability and capacity
      tags: [Staff]
      parameters:
        - name: profileId
          in: path
          required: true
          schema:
            type: string
            format: uuid
          example: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateStaffStatusDto'
            example:
              isOnline: true
              currentLoad: 2
              maxLoad: 5
              categories: [IT, BILLING]
      responses:
        '200':
          description: Updated staff status
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/StaffStatusWithProfile'
        '404':
          description: Staff profile missing or not marked as staff

  /events:
    post:
      summary: WSO2 IAM event webhook — all event types
      description: >
        Single entry point for all WSO2 Identity Server webhook events (login, session,
        token, credential, user-management). The event type is discriminated internally
        by the dispatcher. Requires a valid HMAC-SHA256 signature in the X-Hub-Signature-256 header.
      tags: [IAM Events]
      security:
        - webhookSignature: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CloudEventPayload'
            example:
              specversion: '1.0'
              type: com.wso2.identity.event.credential.update
              source: https://wso2.example.com
              id: evt-abc123
              time: '2024-01-15T10:30:00Z'
              data:
                user:
                  id: 00000001-0000-0000-0000-000000000001
                  claims: []
      responses:
        '200':
          description: Event processed

components:
  securitySchemes:
    webhookSignature:
      type: apiKey
      in: header
      name: X-Hub-Signature-256
      description: HMAC-SHA256 signature of the raw request body
  parameters:
    ProfileId:
      name: id
      in: path
      required: true
      schema:
        type: string
      example: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
  schemas:
    UserRole:
      type: string
      enum: [END_USER, STAFF, ADMIN]
    TicketCategory:
      type: string
      enum: [IT, BILLING, ACCESS, OTHER]
    RegisterUserDto:
      type: object
      required: [username, email, password, firstName, lastName]
      properties:
        username:
          type: string
          pattern: '^[a-zA-Z0-9._-]+$'
          description: Alphanumeric with dots, underscores, and hyphens
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 8
          example: Secret123!
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        phoneNumber:
          type: string
          example: '+1234567890'
        timezone:
          type: string
          example: Asia/Colombo
        language:
          type: string
          example: en
      additionalProperties: false
    StaffProfileInputDto:
      type: object
      properties:
        isOnline:
          type: boolean
          example: true
        currentLoad:
          type: integer
          minimum: 0
          example: 2
        maxLoad:
          type: integer
          minimum: 1
          maximum: 50
          default: 5
          example: 5
        categories:
          type: array
          items: { $ref: '#/components/schemas/TicketCategory' }
          uniqueItems: true
          example: [IT, BILLING]
      additionalProperties: false
    UpdateStaffStatusDto:
      $ref: '#/components/schemas/StaffProfileInputDto'
    Profile:
      type: object
      properties:
        id:
          type: string
          example: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
        username:
          type: string
          example: john_doe
        email:
          type: string
          format: email
          example: john@example.com
        firstName:
          type: string
          example: John
        lastName:
          type: string
          example: Doe
        phoneNumber:
          type: string
          example: '+1234567890'
        timezone:
          type: string
          example: Asia/Colombo
        language:
          type: string
          example: en
        role:
          $ref: '#/components/schemas/UserRole'
        lastLoginAt:
          type: [string, 'null']
          format: date-time
          example: '2024-01-15T10:30:00Z'
        lastRegistrationAt:
          type: [string, 'null']
          format: date-time
          example: '2024-01-15T10:30:00Z'
        lastTokenIssuedAt:
          type: [string, 'null']
          format: date-time
          example: null
        lastTokenRevokedAt:
          type: [string, 'null']
          format: date-time
          example: null
        lastSessionActivityAt:
          type: [string, 'null']
          format: date-time
          example: null
        lastCredentialUpdateAt:
          type: [string, 'null']
          format: date-time
          example: null
        createdAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        staffStatus:
          oneOf:
            - $ref: '#/components/schemas/StaffStatus'
            - type: 'null'
      additionalProperties: false
    StaffStatus:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
        profileId:
          type: string
          example: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
        isOnline:
          type: boolean
          example: true
        currentLoad:
          type: integer
          example: 2
        maxLoad:
          type: integer
          example: 5
        categories:
          type: array
          items: { $ref: '#/components/schemas/TicketCategory' }
          uniqueItems: true
          example: [IT, BILLING]
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
      additionalProperties: false
    StaffStatusWithProfile:
      type: object
      properties:
        id:
          type: string
          format: uuid
          example: 7a8b9c0d-1e2f-3a4b-5c6d-7e8f9a0b1c2d
        profileId:
          type: string
          example: 9f2d1b3e-4a5c-6d7e-8f9a-0b1c2d3e4f5a
        isOnline:
          type: boolean
          example: true
        currentLoad:
          type: integer
          example: 2
        maxLoad:
          type: integer
          example: 5
        categories:
          type: array
          items: { $ref: '#/components/schemas/TicketCategory' }
          uniqueItems: true
          example: [IT, BILLING]
        updatedAt:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        profile:
          $ref: '#/components/schemas/Profile'
      additionalProperties: false
    CloudEventPayload:
      type: object
      description: WSO2 CloudEvents webhook payload
      properties:
        specversion:
          type: string
          example: '1.0'
        type:
          type: string
          description: Event type identifier (e.g. com.wso2.identity.event.login.success)
          example: com.wso2.identity.event.login.success
        source:
          type: string
          example: https://wso2.example.com
        id:
          type: string
          example: evt-abc123
        time:
          type: string
          format: date-time
          example: '2024-01-15T10:30:00Z'
        data:
          type: object
          description: Event-specific payload; shape depends on event type
      additionalProperties: true
